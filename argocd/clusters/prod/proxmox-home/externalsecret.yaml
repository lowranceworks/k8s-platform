apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: prod-proxmox-home-tls
  namespace: argocd
  labels:
    lifecycle: prod
    provider: proxmox
    region: home
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcp-secret-store
    kind: ClusterSecretStore
  target:
    name: prod-proxmox-home
    creationPolicy: Merge
  data:
    - secretKey: config
      remoteRef:
        key: argocd-cluster-prod-proxmox-home
