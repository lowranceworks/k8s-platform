apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: joshualowrance.com
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/lowranceworks/joshualowrance.com.git
    targetRevision: HEAD
    path: frontend/web/
  destination:
    server: https://kubernetes.default.svc
    namespace: joshualowrance.com
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
